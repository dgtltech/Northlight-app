name: Northlight
options:
  bundleIdPrefix: com.john
  deploymentTarget:
    macOS: "15.0"
  developmentLanguage: en
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  Northlight:
    type: application
    platform: macOS
    sources:
      - path: Northlight
        excludes:
          - "Resources/Info.plist"
          - "Northlight.entitlements"
    settings:
      base:
        INFOPLIST_FILE: Northlight/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: tech.dgtl.northlight
        CODE_SIGN_ENTITLEMENTS: Northlight/Northlight.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
